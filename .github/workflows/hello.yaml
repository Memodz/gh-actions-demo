name: Hello World
env:
  APP_NAME: "Demo_Application"
on: 
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/*.yaml"
  pull_request:
    branches: [main]

  repository_dispatch:
    types: ["repository_dispatch"]

jobs:

  echo-vars:
    env:
      PACKAGE_PATH: '.'
    runs-on: ubuntu-latest
    steps:
      - name: Echo environment variables
        env:
          APP_VERSION: "1.0.0"
          RUNNER_CONTEXT: ${{ toJSON(runner) }}
        run: | #mulit-line
          echo "This Repository is ${{ github.repository }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Actor: ${{ github.actor }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run Number: ${{ github.run_number }}"
          echo "Job Status: ${{ job.status }}"
          echo "This branch is ${{ github.ref_name }}"
          echo "This is a ${{env.APP_NAME}} Version ${{env.APP_VERSION}}"
          echo "Runner Context: ${{ env.RUNNER_CONTEXT }}"
          echo "Database Password: ${{ secrets.DB_PASSWORD }}"
  hello-job:
    if: ${{ github.event_client_payload.status != 'completed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Run a one-line script
        run: echo "Hello, World! welcome to my first GitHub Actions workflow"
      - name: Retrieve client payload
        run: echo "Client sent payload ${{ github.event.client_payload.status }}"
  second-job:
    if: ${{ github.event_name != 'repository_dispatch' }}
    runs-on: windows-latest
    needs: hello-job
    steps:
      - run: echo "This job runs on ${{runner.os}}"
        if: ${{ runner.os == 'linux' }}

        
