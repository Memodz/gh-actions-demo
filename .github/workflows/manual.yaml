on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options:
          - "staging"
          - "production"
      run_ui_tests:
        description: 'Run UI Tests'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_status: ${{ steps.set-status.outputs.status }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7.0.0
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref_main }}
      - name: List files in workspace
        run: ls ${{ github.workspace }}
      - name: Set an output status
        id: set-status
        run: |
          echo "Get result from building process"
          echo "status=success" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    if: ${{ inputs.run_ui_tests }}
    steps:
      - name: UI Testing
        run: echo "Running UI Tests on ${{ inputs.environment }} environment"
    